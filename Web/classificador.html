<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Classificador de Pratos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #eef2f7;
      color: #0f172a;
    }

    /* ── header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 40;
      height: 52px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      padding: 0 20px;
      justify-content: space-between;
    }

    header h1 { font-size: 14px; font-weight: 600; color: #0f172a; }
    header p  { font-size: 11px; color: #64748b; margin-top: 1px; }

    .api-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500; color: #059669;
    }
    .api-status .dot {
      width: 7px; height: 7px; border-radius: 50%; background: #10b981;
    }
    .api-status.offline { color: #dc2626; }
    .api-status.offline .dot { background: #ef4444; }

    /* ── main ── */
    main {
      padding-top: 60px;
      padding: 60px 12px 10px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 10px;
      min-height: 0;
    }

    /* ── card base ── */
    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }

    /* ── câmera ── */
    .cam-card {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 12px;
    }

    .cam-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 0 2px;
    }
    .cam-header span:first-child { font-size: 12px; font-weight: 600; color: #0f172a; }
    .cam-header span:last-child  { font-size: 11px; color: #94a3b8; }

    .viewport {
      flex: 1;
      border-radius: 12px;
      overflow: hidden;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    .frame-guide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .frame-box {
      width: min(44vw, 300px);
      height: min(44vw, 300px);
      position: relative;
    }
    .frame-box::before,
    .frame-box::after,
    .frame-box .c-br,
    .frame-box .c-bl {
      content: ''; position: absolute; width: 18px; height: 18px;
    }
    .frame-box::before { top:0;left:0; border-top:2px solid rgba(255,255,255,.75); border-left:2px solid rgba(255,255,255,.75); border-radius:3px 0 0 0; }
    .frame-box::after  { top:0;right:0; border-top:2px solid rgba(255,255,255,.75); border-right:2px solid rgba(255,255,255,.75); border-radius:0 3px 0 0; }
    .frame-box .c-br   { bottom:0;right:0; border-bottom:2px solid rgba(255,255,255,.75); border-right:2px solid rgba(255,255,255,.75); border-radius:0 0 3px 0; }
    .frame-box .c-bl   { bottom:0;left:0; border-bottom:2px solid rgba(255,255,255,.75); border-left:2px solid rgba(255,255,255,.75); border-radius:0 0 0 3px; }

    /* ── sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    /* resultado */
    .card-result { padding: 14px 16px; }

    .card-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    #foodName {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -.5px;
      color: #0f172a;
      word-break: break-word;
    }

    .conf-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      margin-bottom: 5px;
    }
    .conf-row span { font-size: 11px; color: #64748b; }
    .conf-row strong { font-size: 11px; font-weight: 600; color: #0f172a; }

    .conf-track {
      width: 100%; height: 6px;
      border-radius: 100px;
      background: #f1f5f9;
      overflow: hidden;
    }
    .conf-fill {
      height: 100%;
      background: #0f172a;
      border-radius: 100px;
      width: 0%;
      transition: width .3s ease;
    }

    /* status */
    .card-status { padding: 12px 16px; }

    #detectStatus {
      border-radius: 10px;
      background: #f1f5f9;
      color: #475569;
      padding: 9px 12px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
    }
    #detectStatus.detected {
      background: #ecfdf5;
      color: #059669;
    }

    /* infos */
    .card-info { padding: 12px 16px; flex: 1; }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }
    .info-row span { font-size: 12px; color: #64748b; }
    .info-row strong { font-size: 12px; font-weight: 500; color: #0f172a; word-break: break-all; text-align: right; }

    /* ── responsivo ── */
    @media (max-width: 700px) {
      html, body { overflow-y: auto; height: auto; }
      main { height: auto; padding-bottom: 16px; }
      .layout { grid-template-columns: 1fr; grid-template-rows: 56vw auto; }
      .sidebar { flex-direction: row; overflow-x: auto; flex-wrap: nowrap; }
      .sidebar::-webkit-scrollbar { height: 3px; }
      .sidebar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
      .card-result, .card-status, .card-info { flex-shrink: 0; width: 220px; }
      #foodName { font-size: 22px; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Classificador de Pratos</h1>
      <p>Identificação em tempo real</p>
    </div>
    <div class="api-status" id="apiStatus">
      <div class="dot"></div>
      Online
    </div>
  </header>

  <main>
    <div class="layout">

      <!-- câmera -->
      <div class="card cam-card">
        <div class="cam-header">
          <span>Câmera</span>
          <span>Tempo real</span>
        </div>
        <div class="viewport">
          <video id="video" autoplay playsinline></video>
          <div class="frame-guide">
            <div class="frame-box">
              <div class="c-br"></div>
              <div class="c-bl"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- sidebar -->
      <div class="sidebar">

        <div class="card card-result">
          <p class="card-label">Resultado</p>
          <div id="foodName">Aguardando...</div>
          <div class="conf-row">
            <span>Confiança</span>
            <strong id="confidenceText">--</strong>
          </div>
          <div class="conf-track">
            <div class="conf-fill" id="confidenceBar"></div>
          </div>
        </div>

        <div class="card card-status">
          <p class="card-label">Status</p>
          <div id="detectStatus">Aguardando detecção</div>
        </div>

        <div class="card card-info">
          <p class="card-label">Informações</p>
          <div class="info-row"><span>API</span><strong>localhost:8000</strong></div>
          <div class="info-row"><span>Atualização</span><strong>1.2s</strong></div>
          <div class="info-row"><span>Modelo</span><strong>IA Vision</strong></div>
        </div>

      </div>
    </div>
  </main>

<script>
const API_URL = "http://192.168.10.115:8000";
const video   = document.getElementById("video");
let busy = false;

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }, audio: false
    });
    video.srcObject = stream;
  } catch(err) {
    const s = document.getElementById("apiStatus");
    s.innerHTML = '<div class="dot"></div>Offline';
    s.classList.add("offline");
  }
}

async function captureFrame() {
  if (video.videoWidth === 0) return null;
  const canvas = document.createElement("canvas");
  canvas.width = 640; canvas.height = 480;
  const ctx = canvas.getContext("2d");
  ctx.translate(640, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, 640, 480);
  return new Promise(r => canvas.toBlob(r, "image/jpeg", 0.8));
}


async function classify() {
  if (busy) return;
  busy = true;
  try {
    const blob = await captureFrame();
    if (!blob) { busy = false; return; }
    const fd = new FormData();
    fd.append("file", blob, "frame.jpg");
    const res  = await fetch(`${API_URL}/classify`, { method: "POST", body: fd });
    const data = await res.json();
    console.log("[classify]", data);
    if (res.ok && !data.indefinido && data.classe) {
      updateUI(data.classe, data.item || "", data.confianca || 0);
    } else {
      unknownState();
    }
  } catch(e) {
  console.error("[classify error]", e);

  const el = document.getElementById("apiStatus");
  el.innerHTML = '<div class="dot"></div>Offline';
  el.classList.add("offline");

  unknownState();
}
  busy = false;
}

function updateUI(classe, item, confidence) {
  if (!classe || confidence < 0.55) { unknownState(); return; }

  document.getElementById("foodName").innerText       = item || classe;
  document.getElementById("confidenceText").innerText = `${(confidence * 100).toFixed(1)}%`;
  document.getElementById("confidenceBar").style.width = `${confidence * 100}%`;

  const s = document.getElementById("detectStatus");
  s.innerText = "Prato identificado";
  s.className = "detected";
}

function unknownState() {
  document.getElementById("foodName").innerText        = "Nenhum prato";
  document.getElementById("confidenceText").innerText  = "--";
  document.getElementById("confidenceBar").style.width = "0%";

  const s = document.getElementById("detectStatus");
  s.innerText   = "Aguardando detecção";
  s.className   = "";
}

async function checkApi() {
  const el = document.getElementById("apiStatus");

  try {
    const res = await fetch(`${API_URL}/status`);

    if (!res.ok) throw new Error();

    const data = await res.json();

    if (data.online) {
      el.innerHTML = '<div class="dot"></div>Online';
      el.classList.remove("offline");
    } else {
      throw new Error();
    }

  } catch {
    el.innerHTML = '<div class="dot"></div>Offline';
    el.classList.add("offline");
  }
}

setInterval(() => {
  if (video.readyState === 4) classify();
}, 1200);

setInterval(() => {
  checkApi();
}, 3000);

checkApi();
startCamera();
</script>
</body>
</html>
